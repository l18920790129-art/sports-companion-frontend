<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运动智能伴侣 · 路线大师</title>

  <!-- Leaflet 本地化（离线可用，无需翻墙） -->
  <link rel="stylesheet" href="libs/leaflet.css">
  <script src="libs/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f1117; color: #e0e0e0;
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ===== 左侧面板 ===== */
    #sidebar {
      width: 380px; min-width: 340px;
      background: #1a1d2e;
      border-right: 1px solid #2a2d3e;
      display: flex; flex-direction: column;
      overflow-y: auto; z-index: 1000;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: #2a2d3e; border-radius: 2px; }

    .header {
      padding: 18px 20px 14px;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
      border-bottom: 1px solid #2a4a6e;
    }
    .header h1 { font-size: 17px; color: #64b5f6; font-weight: 700; }
    .header p { font-size: 11px; color: #78909c; margin-top: 4px; }

    .section { padding: 14px 18px; border-bottom: 1px solid #1e2133; }
    .sec-title {
      font-size: 11px; font-weight: 600; color: #78909c;
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }

    /* 输入框 */
    #query-input {
      width: 100%; background: #0f1117;
      border: 1px solid #2a4a6e; border-radius: 8px;
      padding: 10px 12px; color: #e0e0e0;
      font-size: 13px; line-height: 1.6;
      resize: vertical; min-height: 85px;
      font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    #query-input:focus { border-color: #64b5f6; }
    #query-input::placeholder { color: #4a4f6a; }

    /* 按钮 */
    #plan-btn {
      width: 100%; margin-top: 10px; padding: 12px;
      background: linear-gradient(135deg, #1565c0, #0d47a1);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center;
      justify-content: center; gap: 8px;
    }
    #plan-btn:hover { background: linear-gradient(135deg, #1976d2, #1565c0); transform: translateY(-1px); }
    #plan-btn:disabled { background: #2a2d3e; color: #555; cursor: not-allowed; transform: none; }

    /* 意图标签 */
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      padding: 3px 9px; border-radius: 12px;
      font-size: 11px; font-weight: 500;
    }
    .tag-blue { background: #0d2137; color: #64b5f6; border: 1px solid #1565c0; }
    .tag-green { background: #0d2a1a; color: #66bb6a; border: 1px solid #2e7d32; }
    .tag-orange { background: #2a1a0d; color: #ffa726; border: 1px solid #e65100; }
    .tag-red { background: #2a0d0d; color: #ef5350; border: 1px solid #c62828; }

    /* 路线卡片 */
    .route-card {
      background: #0f1117; border: 1px solid #2a2d3e;
      border-radius: 10px; padding: 13px; margin-bottom: 10px;
      cursor: pointer; transition: all 0.2s; position: relative;
      overflow: hidden;
    }
    .route-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    .route-card:hover { border-color: #64b5f6; background: #141828; }
    .route-card.active { border-color: #64b5f6; background: #0d1e33; }

    .rc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-left: 8px; }
    .rc-name { font-size: 14px; font-weight: 700; color: #fff; }
    .rc-badge {
      font-size: 10px; padding: 2px 9px; border-radius: 10px; font-weight: 600;
    }
    .badge-rec { background: rgba(229,115,0,0.2); color: #ffa726; border: 1px solid #e65100; }
    .badge-alt { background: rgba(21,101,192,0.2); color: #64b5f6; border: 1px solid #1565c0; }
    .badge-ref { background: rgba(55,71,79,0.3); color: #90a4ae; border: 1px solid #37474f; }

    .rc-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px; margin-bottom: 10px; padding-left: 8px;
    }
    .stat { background: #141624; border-radius: 7px; padding: 7px; text-align: center; }
    .stat-val { font-size: 15px; font-weight: 700; color: #64b5f6; }
    .stat-lbl { font-size: 10px; color: #546e7a; margin-top: 1px; }

    .rc-desc {
      font-size: 12px; color: #90a4ae; line-height: 1.6;
      border-top: 1px solid #1a1d2e; padding-top: 8px; margin-top: 4px;
      padding-left: 8px;
    }

    /* 性能数据 */
    .perf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .perf-item { background: #0f1117; border-radius: 6px; padding: 7px; text-align: center; }
    .perf-val { font-size: 14px; font-weight: 700; color: #66bb6a; }
    .perf-lbl { font-size: 10px; color: #546e7a; margin-top: 1px; }

    /* 数据来源 */
    .data-src {
      font-size: 10px; color: #37474f; padding: 8px 18px;
      border-top: 1px solid #1e2133; line-height: 1.5;
    }

    /* 加载 */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 错误 */
    .err-msg {
      background: rgba(198,40,40,0.1); border: 1px solid rgba(198,40,40,0.4);
      border-radius: 7px; padding: 9px 12px;
      font-size: 12px; color: #ef5350; margin-top: 8px;
    }

    /* 空状态 */
    .empty { text-align: center; padding: 30px 20px; color: #37474f; }
    .empty .ico { font-size: 42px; margin-bottom: 10px; opacity: 0.5; }
    .empty p { font-size: 12px; line-height: 1.7; }

    /* 地图 */
    #map { flex: 1; height: 100vh; }

    /* 图例 */
    .legend {
      background: rgba(26,29,46,0.92); border: 1px solid #2a2d3e;
      border-radius: 8px; padding: 10px 13px; font-size: 11px;
    }
    .leg-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
    .leg-line { width: 22px; height: 3px; border-radius: 2px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="header">
    <h1>🏃 运动智能伴侣 · 路线大师</h1>
    <p>GIS · LLM · 厦门市真实路网 · 个性化运动路线规划</p>
  </div>

  <!-- 输入 -->
  <div class="section">
    <div class="sec-title">📝 描述你的运动需求</div>
    <textarea id="query-input" placeholder="例如：今天下午我想进行一个90分钟的耐力跑，希望沿途有树荫和水站，最后能看到一段海景。我最近左脚踝有点不适。">今天下午我想进行一个90分钟的耐力跑，希望沿途有树荫和水站，最后能看到一段海景。我最近左脚踝有点不适。</textarea>
    <button id="plan-btn" onclick="planRoute()">
      <span id="btn-inner">🗺️ 智能规划路线</span>
    </button>
    <div id="err-box"></div>
  </div>

  <!-- 意图解析 -->
  <div class="section" id="intent-sec" style="display:none">
    <div class="sec-title">🧠 LLM意图解析</div>
    <div class="tags" id="intent-tags"></div>
  </div>

  <!-- 路线方案 -->
  <div class="section" id="routes-sec" style="display:none">
    <div class="sec-title">📍 路线方案 · <span id="route-cnt">0</span> 条</div>
    <div id="routes-box"></div>
  </div>

  <!-- 空状态 -->
  <div class="empty" id="empty-state">
    <div class="ico">🗺️</div>
    <p>输入运动需求<br>AI将基于厦门市真实路网<br>生成个性化路线方案</p>
  </div>

  <!-- 性能数据 -->
  <div class="section" id="perf-sec" style="display:none">
    <div class="sec-title">⚡ 性能数据</div>
    <div class="perf-grid" id="perf-grid"></div>
  </div>

  <div class="data-src">
    数据来源：OpenStreetMap厦门市路网（17,128条路段）· SRTM 30m DEM高程 · 本地POI（917个）· NDVI植被分析
  </div>
</div>

<div id="map"></div>

<script>
// ===== 配置 =====
const API_BASE = 'https://sports-companion-backend-production.up.railway.app/api';
const ROUTE_COLORS = ['#E74C3C', '#3498DB', '#2ECC71'];

// ===== 修复Leaflet本地图标路径 =====
delete L.Icon.Default.prototype._getIconUrl;
L.Icon.Default.mergeOptions({
  iconUrl: 'libs/marker-icon.png',
  iconRetinaUrl: 'libs/marker-icon-2x.png',
  shadowUrl: 'libs/marker-shadow.png',
});

// ===== 初始化地图 =====
const map = L.map('map', {
  center: [24.4500, 118.0800],
  zoom: 13,
});

// 天地图矢量底图（国内可用，无需翻墙）
// 公共Token仅供演示，生产环境请申请自己的Key：https://console.tianditu.gov.cn
const TDT_KEY = '1d109683f4d84198e37a38c442d68311';
const tdtVec = L.tileLayer(
  `https://t{s}.tianditu.gov.cn/vec_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=vec&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_KEY}`,
  { subdomains: ['0','1','2','3','4','5','6','7'], maxZoom: 18, attribution: '© 天地图 GS(2023)336号' }
);
const tdtLabel = L.tileLayer(
  `https://t{s}.tianditu.gov.cn/cva_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cva&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_KEY}`,
  { subdomains: ['0','1','2','3','4','5','6','7'], maxZoom: 18, opacity: 0.9 }
);

// 备用：CartoDB暗色（天地图失败时自动切换）
const cartoFallback = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { subdomains: 'abcd', maxZoom: 19, attribution: '© OpenStreetMap © CARTO' }
);

let tdtFailed = false;
tdtVec.on('tileerror', function() {
  if (!tdtFailed) {
    tdtFailed = true;
    map.removeLayer(tdtVec);
    if (map.hasLayer(tdtLabel)) map.removeLayer(tdtLabel);
    cartoFallback.addTo(map);
  }
});
tdtVec.addTo(map);
tdtLabel.addTo(map);

// ===== 图例 =====
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const d = L.DomUtil.create('div', 'legend');
  d.innerHTML = `
    <div style="font-weight:700;color:#fff;margin-bottom:7px;font-size:12px;">路线图例</div>
    <div class="leg-item"><div class="leg-line" style="background:#E74C3C;height:4px"></div><span style="color:#ccc">路线A（推荐）★</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#3498DB"></div><span style="color:#ccc">路线B（备选）</span></div>
    <div class="leg-item"><div class="leg-line" style="background:#2ECC71;border-top:2px dashed #2ECC71;background:none"></div><span style="color:#ccc">路线C（参考）</span></div>
    <div class="leg-item"><span style="font-size:14px">💧</span><span style="color:#ccc">水站/饮水点</span></div>
    <div class="leg-item"><span style="font-size:14px">🌊</span><span style="color:#ccc">海景观测点</span></div>
    <div class="leg-item"><span style="font-size:14px">🟡</span><span style="color:#ccc">起点</span></div>
  `;
  return d;
};
legend.addTo(map);

// ===== 全局状态 =====
let routeLayers = [], poiMarkers = [], startMarker = null;

// ===== 主函数 =====
async function planRoute() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) { showErr('请输入运动需求描述'); return; }

  setBtnLoading(true);
  clearErr();
  clearMap();
  hide('intent-sec'); hide('routes-sec'); hide('perf-sec');
  show('empty-state');

  try {
    const resp = await fetch(`${API_BASE}/plan/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await resp.json();

    if (!resp.ok || !data.success) throw new Error(data.error || '规划失败');

    hide('empty-state');
    renderIntent(data.parsed_params);
    renderRoutes(data.routes);
    renderMap(data);
    renderPerf(data.performance);

  } catch (e) {
    showErr(e.message);
  } finally {
    setBtnLoading(false);
  }
}

// ===== 渲染意图标签 =====
function renderIntent(p) {
  if (!p) return;
  const box = document.getElementById('intent-tags');
  box.innerHTML = '';
  const add = (text, cls) => {
    const s = document.createElement('span');
    s.className = `tag ${cls}`; s.textContent = text;
    box.appendChild(s);
  };
  if (p.duration_min)           add(`⏱ ${p.duration_min}分钟`, 'tag-blue');
  if (p.sport_type)             add(`🏃 ${p.sport_type}`, 'tag-blue');
  if (p.target_distance_km)     add(`📏 约${p.target_distance_km}km`, 'tag-blue');
  if (p.pace_min_per_km)        add(`⚡ ${p.pace_min_per_km}min/km`, 'tag-blue');
  if (p.need_shade)             add('🌳 需要树荫', 'tag-green');
  if (p.need_water)             add('💧 需要水站', 'tag-green');
  if (p.need_sea_view)          add('🌊 需要海景', 'tag-green');
  if (p.ankle_issue)            add('⚠️ 脚踝不适', 'tag-red');
  if (p.avoid_steps)            add('🚫 避免台阶', 'tag-orange');
  if (p.avoid_hard_surface)     add('🚫 避免硬路面', 'tag-orange');
  show('intent-sec');
}

// ===== 渲染路线卡片 =====
function renderRoutes(routes) {
  const box = document.getElementById('routes-box');
  box.innerHTML = '';
  document.getElementById('route-cnt').textContent = routes.length;

  const badges = [
    ['推荐', 'badge-rec'],
    ['备选', 'badge-alt'],
    ['参考', 'badge-ref'],
  ];

  routes.forEach((r, i) => {
    const color = ROUTE_COLORS[i] || '#888';
    const [rankText, rankCls] = badges[i] || ['参考', 'badge-ref'];
    const surfaceMap = { asphalt: '沥青', path: '步道', unpaved: '土路', steps: '台阶', residential: '居民路' };
    const surface = surfaceMap[r.dominant_surface] || r.dominant_surface || '混合';

    const card = document.createElement('div');
    card.className = 'route-card';
    card.id = `rc-${i}`;
    card.style.setProperty('--rc', color);
    card.onclick = () => selectRoute(i);
    card.innerHTML = `
      <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${color};border-radius:10px 0 0 10px"></div>
      <div class="rc-header">
        <div class="rc-name">${r.name}：${r.label || ''}</div>
        <div class="rc-badge ${rankCls}">${rankText}</div>
      </div>
      <div class="rc-stats">
        <div class="stat"><div class="stat-val">${r.total_length_km}</div><div class="stat-lbl">公里</div></div>
        <div class="stat"><div class="stat-val">${r.shade_pct}%</div><div class="stat-lbl">树荫覆盖</div></div>
        <div class="stat"><div class="stat-val">${r.water_stations}</div><div class="stat-lbl">水站</div></div>
        <div class="stat"><div class="stat-val">${r.elevation_gain_m}m</div><div class="stat-lbl">累计爬升</div></div>
        <div class="stat"><div class="stat-val">${r.sea_view_pois}</div><div class="stat-lbl">海景点</div></div>
        <div class="stat"><div class="stat-val">${r.has_steps ? '有' : '无'}</div><div class="stat-lbl">台阶</div></div>
      </div>
      <div class="rc-desc">${r.description || ''}</div>
    `;
    box.appendChild(card);
  });

  show('routes-sec');
}

// ===== 渲染地图 =====
function renderMap(data) {
  const routes = data.routes || [];
  const sp = data.start_point;
  const poi = data.poi_geojson;

  // 起点
  if (sp) {
    const ico = L.divIcon({
      html: '<div style="background:#f59e0b;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>',
      iconSize: [14,14], iconAnchor: [7,7], className: '',
    });
    startMarker = L.marker([sp.lat, sp.lon], { icon: ico })
      .bindPopup('<b>起点</b><br>厦门市环岛路').addTo(map);
  }

  const allBounds = [];

  // 路线
  routes.forEach((r, i) => {
    const color = ROUTE_COLORS[i] || '#888';
    const coords = r.coords || [];
    if (coords.length < 2) return;

    const line = L.polyline(coords, {
      color, weight: i === 0 ? 5 : 3,
      opacity: i === 0 ? 0.95 : 0.6,
      dashArray: i === 2 ? '6,5' : null,
    }).addTo(map);

    line.bindPopup(`
      <b>${r.name}：${r.label}</b><br>
      距离：${r.total_length_km} km<br>
      树荫：${r.shade_pct}%<br>
      水站：${r.water_stations} 个<br>
      爬升：${r.elevation_gain_m} m
    `);

    routeLayers.push(line);
    coords.forEach(c => allBounds.push(c));
  });

  // POI
  if (poi && poi.features) {
    const emojiMap = { water: '💧', viewpoint: '🌊', park: '🌳', amenity: '🏪' };
    poi.features.forEach(f => {
      const [lon, lat] = f.geometry.coordinates;
      const props = f.properties;
      const emoji = emojiMap[props.type] || '📍';
      const ico = L.divIcon({
        html: `<div style="font-size:16px;line-height:1;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.8))">${emoji}</div>`,
        iconSize: [20,20], iconAnchor: [10,10], className: '',
      });
      const m = L.marker([lat, lon], { icon: ico })
        .bindPopup(`<b>${props.name}</b><br>${props.category || props.type}`);
      poiMarkers.push(m);
      m.addTo(map);
    });
  }

  if (allBounds.length > 0) map.fitBounds(allBounds, { padding: [50, 50] });
  selectRoute(0);
}

// ===== 选中路线 =====
function selectRoute(idx) {
  document.querySelectorAll('.route-card').forEach((c, i) => c.classList.toggle('active', i === idx));
  routeLayers.forEach((l, i) => {
    l.setStyle({ weight: i === idx ? 7 : 2, opacity: i === idx ? 1.0 : 0.35 });
    if (i === idx) l.bringToFront();
  });
  const card = document.getElementById(`rc-${idx}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== 渲染性能数据 =====
function renderPerf(p) {
  if (!p) return;
  const grid = document.getElementById('perf-grid');
  grid.innerHTML = `
    <div class="perf-item"><div class="perf-val">${p.total_time_s}s</div><div class="perf-lbl">总响应时间</div></div>
    <div class="perf-item"><div class="perf-val">${p.llm_parse_time_s}s</div><div class="perf-lbl">LLM意图解析</div></div>
    <div class="perf-item"><div class="perf-val">${p.gis_analysis_time_s}s</div><div class="perf-lbl">GIS路径规划</div></div>
    <div class="perf-item"><div class="perf-val">${p.llm_description_time_s}s</div><div class="perf-lbl">LLM路线描述</div></div>
  `;
  show('perf-sec');
}

// ===== 工具函数 =====
function clearMap() {
  routeLayers.forEach(l => map.removeLayer(l)); routeLayers = [];
  poiMarkers.forEach(l => map.removeLayer(l)); poiMarkers = [];
  if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
}
function setBtnLoading(on) {
  const btn = document.getElementById('plan-btn');
  btn.disabled = on;
  document.getElementById('btn-inner').innerHTML = on
    ? '<div class="spinner"></div> AI规划中...'
    : '🗺️ 智能规划路线';
}
function showErr(msg) { document.getElementById('err-box').innerHTML = `<div class="err-msg">⚠️ ${msg}</div>`; }
function clearErr() { document.getElementById('err-box').innerHTML = ''; }
function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

// Ctrl+Enter 快捷键
document.getElementById('query-input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') planRoute();
});
</script>
</body>
</html>
